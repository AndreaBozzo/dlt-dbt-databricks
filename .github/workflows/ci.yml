name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-parse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # gitleaks-action scans the PR commit range (<sha>^..<sha>); the default
          # shallow clone omits the parent, so fetch full history to resolve it.
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra postgres

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Unit tests
        run: uv run pytest

      - name: dbt deps + parse
        working-directory: transformation/dbt_databricks
        run: |
          cp profiles.yml.example profiles.yml
          uv run dbt deps
          uv run dbt parse
        env:
          # dbt parse does not connect; these satisfy any env_var() lookups during parsing.
          DLT_DATASET_NAME: raw

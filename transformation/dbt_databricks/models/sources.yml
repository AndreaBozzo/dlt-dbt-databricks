version: 2

sources:
  # The `raw` schema is owned by dlt (DLT_DATASET_NAME). dbt only READS from it.
  # `schema` resolves from the same env var the dlt pipelines use, so the two stay in sync.
  - name: raw
    schema: "{{ env_var('DLT_DATASET_NAME', 'raw') }}"
    description: "Raw tables landed by the dlt pipelines (see ingestion/)."
    # SOURCE FRESHNESS: _dlt_load_id is a unix-epoch string dlt stamps on every row, so it dates
    # the last load without needing a separate audit column. Each engine spells epoch→timestamp
    # differently, hence the per-adapter expression. Run: dbt source freshness
    config:
      loaded_at_field: "{{ 'timestamp_seconds(cast(_dlt_load_id as double))' if target.type == 'databricks' else 'to_timestamp(cast(_dlt_load_id as double))' }}"
      freshness:
        warn_after: {count: 24, period: hour}
    tables:
      - name: rest_posts
        description: "Posts from the rest_api_to_databricks dlt pipeline."
        columns:
          - name: id
            description: "Post id (dlt primary key)."
            data_tests: [not_null, unique]
      - name: rest_comments
        description: "Comments, child resource of rest_posts."
        columns:
          - name: id
            data_tests: [not_null, unique]
          - name: post_id
            description: "FK to rest_posts.id."
      # --- From optional dlt examples; may not exist until you run those pipelines,
      #     so they opt out of the source-level freshness check. ---
      - name: rnc_database
        description: "Reference table replicated by the sql_database_to_databricks dlt pipeline."
        config:
          freshness: null
      - name: customers
        description: "Customers loaded by the advanced merge/incremental dlt pipeline."
        config:
          freshness: null

  # Real insurance dataset shipped in every Databricks workspace (samples catalog).
  # `database` overrides the catalog (default profile catalog is `workspace`).
  - name: healthverity
    database: samples
    schema: healthverity
    description: "Synthetic healthcare insurance claims (line-detail grain). ~410k rows."
    tables:
      - name: claims_sample_synthetic
        description: "One row per claim service line detail. Not unique on (claim_id, service_line_number)."
        # DuckDB lane only (ignored by the Databricks adapter): resolve this source from a small
        # checked-in sample CSV with the same all-string shape as samples.healthverity.
        # all_varchar keeps the raw contract identical (staging owns all casting).
        # Path is cwd-relative — run dbt from the repo root (make / CI do).
        config:
          meta:
            external_location: "read_csv('transformation/dbt_databricks/local_data/claims_sample_synthetic.csv', all_varchar=true)"
        columns:
          - name: claim_id
            description: "Claim identifier (a claim has many service lines)."
          - name: hvid
            description: "De-identified member id."

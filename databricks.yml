# Databricks Asset Bundle (DAB) — packages the dlt → dbt pipeline as a deployable Databricks Job.
# The job runs dlt ingestion, then (on success) dbt build, mirroring orchestration/run_e2e.py but
# as production-grade, version-controlled infrastructure.
#
#   databricks bundle validate --var warehouse_id=YOUR_WAREHOUSE_ID
#   databricks bundle deploy -t dev --var warehouse_id=YOUR_WAREHOUSE_ID
#   databricks bundle run dlt_dbt_pipeline -t dev
#
# See orchestration/README.md for the rationale.

bundle:
  name: dlt_dbt_databricks

variables:
  warehouse_id:
    description: "SQL warehouse id used by the dbt task."
    default: YOUR_WAREHOUSE_ID
  catalog:
    description: "Unity Catalog catalog for outputs."
    default: workspace
  schema:
    description: "Unity Catalog schema where dbt builds models."
    default: analytics

targets:
  dev:
    mode: development
    default: true
  prod:
    mode: production

resources:
  jobs:
    dlt_dbt_pipeline:
      name: "dlt-dbt-databricks [${bundle.target}]"
      tasks:
        # 1) dlt ingestion. Inside a Databricks job, dlt can resolve credentials from the runtime
        #    (zero-config) — no PAT in the bundle.
        - task_key: dlt_ingest
          environment_key: default
          spark_python_task:
            python_file: ingestion/pipelines/rest_api_to_databricks.py
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--dataset-name"
              - "raw"
              - "--load-mode"
              - "spark"
        # 2) dbt build — only after ingestion succeeds. Runs against the SQL warehouse.
        - task_key: dbt_build
          depends_on:
            - task_key: dlt_ingest
          environment_key: default
          dbt_task:
            project_directory: transformation/dbt_databricks
            catalog: ${var.catalog}
            schema: ${var.schema}
            warehouse_id: ${var.warehouse_id}
            commands:
              - "dbt deps"
              - "dbt build"
      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - "dlt[databricks]>=1.6.0"
              - "dbt-databricks>=1.11,<2"
              - "python-dotenv>=1.0"
